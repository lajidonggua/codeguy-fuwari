<svg width="1600" height="900" viewBox="0 0 1600 900" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="120" y1="80" x2="1460" y2="820" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0F172A"/>
      <stop offset="0.45" stop-color="#1E1B4B"/>
      <stop offset="1" stop-color="#0B1120"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#1D4ED8" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#8B5CF6" stop-opacity="0.18"/>
    </linearGradient>
    <linearGradient id="line1" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#38BDF8"/>
      <stop offset="1" stop-color="#22C55E"/>
    </linearGradient>
    <linearGradient id="line2" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#F59E0B"/>
      <stop offset="1" stop-color="#EF4444"/>
    </linearGradient>
  </defs>

  <rect width="1600" height="900" rx="36" fill="url(#bg)"/>
  <circle cx="1320" cy="170" r="220" fill="#2563EB" fill-opacity="0.14"/>
  <circle cx="1440" cy="760" r="260" fill="#7C3AED" fill-opacity="0.12"/>
  <circle cx="180" cy="760" r="180" fill="#22C55E" fill-opacity="0.08"/>

  <rect x="84" y="86" width="1432" height="728" rx="28" fill="url(#card)" stroke="#334155" stroke-opacity="0.7"/>

  <text x="140" y="210" fill="#93C5FD" font-size="28" font-family="Arial, Helvetica, sans-serif" font-weight="700">Java 在线诊断 · 性能调优 · 面试复盘</text>
  <text x="140" y="300" fill="#F8FAFC" font-size="72" font-family="Arial, Helvetica, sans-serif" font-weight="800">Arthas 性能调优实战</text>
  <text x="140" y="382" fill="#E2E8F0" font-size="38" font-family="Arial, Helvetica, sans-serif" font-weight="600">案例复盘 / 常用命令 / STAR 描述 / 面试口述版</text>

  <rect x="140" y="448" width="640" height="220" rx="24" fill="#0F172A" fill-opacity="0.78" stroke="#334155"/>
  <text x="178" y="500" fill="#60A5FA" font-size="30" font-family="Arial, Helvetica, sans-serif" font-weight="700">诊断路径</text>
  <text x="178" y="554" fill="#F8FAFC" font-size="28" font-family="Arial, Helvetica, sans-serif">监控发现异常</text>
  <text x="178" y="600" fill="#CBD5E1" font-size="24" font-family="Arial, Helvetica, sans-serif">→ 用 trace / watch / monitor 锁定慢点</text>
  <text x="178" y="646" fill="#CBD5E1" font-size="24" font-family="Arial, Helvetica, sans-serif">→ 优化 SQL、缓存、重试策略并验证收益</text>

  <rect x="960" y="190" width="460" height="470" rx="28" fill="#0F172A" fill-opacity="0.84" stroke="#334155"/>
  <text x="1000" y="248" fill="#A78BFA" font-size="30" font-family="Arial, Helvetica, sans-serif" font-weight="700">核心命令</text>
  <text x="1000" y="318" fill="#E5E7EB" font-size="28" font-family="Courier New, monospace">dashboard</text>
  <text x="1000" y="372" fill="#E5E7EB" font-size="28" font-family="Courier New, monospace">thread -n 5</text>
  <text x="1000" y="426" fill="#E5E7EB" font-size="28" font-family="Courier New, monospace">trace com.demo.Service query</text>
  <text x="1000" y="480" fill="#E5E7EB" font-size="28" font-family="Courier New, monospace">watch com.demo.Service query</text>
  <text x="1000" y="534" fill="#E5E7EB" font-size="28" font-family="Courier New, monospace">monitor -c 5 com.demo.Service query</text>
  <text x="1000" y="604" fill="#34D399" font-size="46" font-family="Arial, Helvetica, sans-serif" font-weight="800">P95 ↓ 77%</text>

  <path d="M990 704C1060 652 1128 628 1198 610C1278 590 1354 576 1422 518" stroke="url(#line1)" stroke-width="12" stroke-linecap="round"/>
  <path d="M992 742C1058 734 1118 718 1186 696C1272 668 1348 626 1420 568" stroke="url(#line2)" stroke-width="12" stroke-linecap="round"/>

  <text x="140" y="760" fill="#94A3B8" font-size="24" font-family="Arial, Helvetica, sans-serif">适合写博客、做复盘，也适合面试口述表达</text>
</svg>
